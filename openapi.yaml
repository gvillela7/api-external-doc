{
  "openapi": "3.1.0",
  "info": {
    "title": "Zarpx API Doc",
    "version": "1.0.0",
    "description": "API REST da Zarpx destinada a integrações com parceiros, oferecendo endpoints específicos para serviços, tipos de serviços, tipos de veículos e webhooks. Segurança: armazene e transmita os tokens de acesso com segurança, nunca os exponha em código client-side ou repositórios públicos, rotacione-os periodicamente e restrinja seus escopos sempre que possível.",
    "contact": {
      "name": "Suporte Zarpx",
      "email": "suporte@jwtransportes.com.br"
    }
  },
  "tags": [
    { "name": "Auth", "description": "Autenticação e obtenção de tokens de acesso" },
    { "name": "Service", "description": "Gerenciamento de serviços de transporte" },
    { "name": "ServiceType", "description": "Tipos de serviço disponíveis" },
    { "name": "VehicleType", "description": "Tipos de veículo disponíveis" },
    { "name": "WebHook", "description": "Gerenciamento de webhooks para notificações `Em Breve`" },
    { "name": "Contracts", "description": "Tarifários e configurações de preço do cliente" },
    { "name": "Workspace", "description": "Estatísticas e dados consolidados do workspace do cliente" }
  ],
  "servers": [
    {
      "url": "https://api-staging.zarpx.com/api/v1",
      "description": "API - Test"
    },
    { "url": "https://api.zarpx.com/api/v1", "description": "API - Prod" },
    {
      "url": "https://api-auth-staging.zarpx.com/v1",
      "description": "Auth - Test"
    },
    { "url": "https://api-auth.zarpx.com/v1", "description": "Auth - Prod" }
  ],
  "paths": {
    "/auth/login": {
      "post": {
        "operationId": "auth.login",
        "description": "Autentique-se usando credenciais do cliente (client credentials) para obter um token de acesso. Para obter seu `client_secret`, entre em contato com o suporte em suporte@jwtransportes.com.br.\n\n**Cabeçalhos obrigatórios:**\nContent-Type: application/json,\nX-Access-Service: external (obrigatório).\n\n**Segurança:**\nMantenha suas credenciais de cliente em segurança e nunca as exponha em código do lado do cliente (client-side) ou em repositórios públicos.",
        "summary": "External Login with Client Credentials",
        "tags": ["Auth"],
        "security": [],
        "servers": [
          {
            "url": "https://api-auth-staging.zarpx.com/v1",
            "description": "Servidor de API de autenticação"
          }
        ],
        "parameters": [
          {
            "name": "X-Access-Service",
            "in": "header",
            "required": true,
            "description": "Identificador de acesso ao serviço. Deve ser definido como 'external'",
            "schema": { "type": "string", "enum": ["external"] },
            "example": "external"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthExternalLoginRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Autenticação bem-sucedida",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthExternalLoginResponse"
                }
              }
            }
          },
          "401": {
            "description": "Não autorizado - Credenciais de cliente inválidas",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "statusCode": { "type": "integer", "example": 401 },
                    "message": {
                      "type": "string",
                      "example": "Invalid client credentials"
                    }
                  },
                  "required": ["statusCode", "message"]
                }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst response = await axios.post(\n  'https://api-auth-staging.zarpx.com/v1/auth/login',\n  {\n    client_secret: 'SEU_CLIENT_SECRET',\n    client_id: 'SEU_CLIENT_ID',\n    grant_type: 'client_credentials'\n  },\n  {\n    headers: {\n      'Content-Type': 'application/json',\n      'X-Access-Service': 'external'\n    }\n  }\n);\n\nconsole.log(response.data);"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n\n$response = $client->post('https://api-auth-staging.zarpx.com/v1/auth/login', [\n    'headers' => [\n        'Content-Type' => 'application/json',\n        'X-Access-Service' => 'external',\n    ],\n    'json' => [\n        'client_secret' => 'SEU_CLIENT_SECRET',\n        'client_id' => 'SEU_CLIENT_ID',\n        'grant_type' => 'client_credentials',\n    ],\n]);\n\n$data = json_decode($response->getBody(), true);\nprint_r($data);"
          }
        ]
      }
    },
    "/services/show/{id}": {
      "get": {
        "operationId": "service.show",
        "description": "Exibe o serviço especificado. O parâmetro ID corresponde ao atributo service_map_id. Retorna o serviço com seus relacionamentos: service_type, vehicle_type e route_service.",
        "summary": "Show Service",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" },
          {
            "name": "id",
            "in": "path",
            "required": true,
            "description": "O service_map_id do serviço a ser recuperado",
            "schema": { "type": "integer" }
          }
        ],
        "responses": {
          "200": {
            "description": "Resposta bem-sucedida",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ServiceShowResponse" }
              }
            }
          },
          "400": {
            "description": "ID inválido",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": { "status": 400, "message": "ID invalido." }
              }
            }
          },
          "401": { "$ref": "#/components/responses/AuthenticationException" },
          "404": {
            "description": "Serviço não encontrado",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": { "status": 404, "message": "Servico nao encontrado." }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst serviceMapId = 123;\n\nconst response = await axios.get(\n  `https://api-staging.zarpx.com/api/v1/services/show/${serviceMapId}`,\n  {\n    headers: {\n      'Authorization': `Bearer ${accessToken}`,\n      'X-Access-Service': 'external'\n    }\n  }\n);\n\nconsole.log(response.data);"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n$serviceMapId = 123;\n\n$response = $client->get(\"https://api-staging.zarpx.com/api/v1/services/show/{$serviceMapId}\", [\n    'headers' => [\n        'Authorization' => 'Bearer ' . $accessToken,\n        'X-Access-Service' => 'external',\n    ],\n]);\n\n$data = json_decode($response->getBody(), true);\nprint_r($data);"
          }
        ]
      }
    },
    "/services/filter": {
      "get": {
        "operationId": "service.filter",
        "description": "Filtra serviços por parâmetros com suporte a paginação. Use groupBy=true para agrupar os resultados por data. Ex.: /services/filter?range_date=2025-01-31,2026-10-31&status=Created&groupBy=true&per_page=25&page=1",
        "summary": "Filter Services",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" },
          {
            "name": "range_date",
            "in": "query",
            "required": true,
            "description": "Intervalo de datas no formato: YYYY-MM-DD,YYYY-MM-DD",
            "schema": { "type": "string" },
            "example": "2025-10-01,2025-10-31"
          },
          {
            "name": "driver_id",
            "in": "query",
            "required": false,
            "description": "Filtrar por ID do motorista",
            "schema": { "type": "string" }
          },
          {
            "name": "vehicle_type_id",
            "in": "query",
            "required": false,
            "description": "Filtrar por ID do tipo de veículo",
            "schema": { "type": "string" }
          },
          {
            "name": "vehicle_id",
            "in": "query",
            "required": false,
            "description": "Filtrar por ID do veículo",
            "schema": { "type": "string" }
          },
          {
            "name": "type_service_id",
            "in": "query",
            "required": false,
            "description": "Filtrar por ID do tipo de serviço",
            "schema": { "type": "string" }
          },
          {
            "name": "file",
            "in": "query",
            "required": false,
            "description": "Filtrar por arquivo",
            "schema": { "type": "string" },
            "example": "1234"
          },
          {
            "name": "service_map_id",
            "in": "query",
            "required": false,
            "description": "Filtrar por ID do mapa de serviço",
            "schema": { "type": "integer" }
          },
          {
            "name": "status",
            "in": "query",
            "required": false,
            "description": "Filtrar por status do serviço",
            "schema": {
              "type": "string",
              "enum": ["Created", "OS_Created", "Canceled", "Finished", "No_Show"]
            }
          },
          {
            "name": "groupBy",
            "in": "query",
            "required": false,
            "description": "Quando true, agrupa os resultados por data de início (start_date). Padrão: false.",
            "schema": { "type": "boolean", "default": false }
          },
          {
            "name": "per_page",
            "in": "query",
            "required": false,
            "description": "Quantidade de resultados por página (padrão: 25)",
            "schema": { "type": "integer", "default": 25, "minimum": 1, "maximum": 100 }
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "description": "Número da página para paginação (padrão: 1)",
            "schema": { "type": "integer", "default": 1, "minimum": 1 }
          }
        ],
        "responses": {
          "200": {
            "description": "Resposta bem-sucedida com paginação",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ServiceFilterPaginatedResponse"
                }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ValidationException" },
          "401": { "$ref": "#/components/responses/AuthenticationException" },
          "403": {
            "description": "Erro de validação do range_date",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": {
                  "status": 403,
                  "message": "range_date deve conter duas datas separadas por virgula."
                }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst response = await axios.get(\n  'https://api-staging.zarpx.com/api/v1/services/filter',\n  {\n    headers: {\n      'Authorization': `Bearer ${accessToken}`,\n      'X-Access-Service': 'external'\n    },\n    params: {\n      range_date: '2025-01-31,2026-10-31',\n      status: 'Created',\n      file: '1234',\n      groupBy: true,\n      per_page: 25,\n      page: 1\n    }\n  }\n);\n\nconsole.log(response.data);"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n\n$response = $client->get('https://api-staging.zarpx.com/api/v1/services/filter', [\n    'headers' => [\n        'Authorization' => 'Bearer ' . $accessToken,\n        'X-Access-Service' => 'external',\n    ],\n    'query' => [\n        'range_date' => '2025-01-31,2026-10-31',\n        'status' => 'Created',\n        'file' => '1234',\n        'groupBy' => true,\n        'per_page' => 25,\n        'page' => 1,\n    ],\n]);\n\n$data = json_decode($response->getBody(), true);\nprint_r($data);"
          }
        ]
      }
    },
    "/services/create": {
      "post": {
        "operationId": "service.create",
        "description": "Cria um ou mais serviços em lote. O body é um array de serviços. service_type_id e vehicle_type_id podem ser obtidos nos endpoints /service-type/list e /vehicle-type/list. Cada rota (route) deve ter no mínimo 1 item.",
        "summary": "Create Service",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ServiceCreateRequest" }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Serviço(s) criado(s) com sucesso",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ServiceCreateResponse"
                }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ValidationException" },
          "401": { "$ref": "#/components/responses/AuthenticationException" },
          "404": {
            "description": "Tipo de serviço ou tipo de veículo não encontrado",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": {
                  "status": 404,
                  "message": "Tipo de servico nao encontrado."
                }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst response = await axios.post(\n  'https://api-staging.zarpx.com/api/v1/services/create',\n  [\n    {\n      start_date: '2025-10-31',\n      start_time: '11:30',\n      pax: 2,\n      flight: 'JHG0987',\n      service_type_id: '66c8d82098b4b246ec02a1c2',\n      vehicle_type_id: '66aa78be9613f729b9017de2',\n      description: 'Levar para o barra shopping',\n      participants: [\n        { name: 'Fulano', phone: '(11) 99999-9999' }\n      ],\n      route: [\n        {\n          origin: { name: 'Ed. Central', street: 'Av. Rio Branco' },\n          destination: { name: 'SDU', street: 'Aeroporto Santos Dumont' },\n          time: 30,\n          km: 15.5\n        }\n      ]\n    }\n  ],\n  {\n    headers: {\n      'Authorization': `Bearer ${accessToken}`,\n      'Content-Type': 'application/json',\n      'X-Access-Service': 'external'\n    }\n  }\n);\n\nconsole.log(response.data);"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n\n$response = $client->post('https://api-staging.zarpx.com/api/v1/services/create', [\n    'headers' => [\n        'Authorization' => 'Bearer ' . $accessToken,\n        'Content-Type' => 'application/json',\n        'X-Access-Service' => 'external',\n    ],\n    'json' => [\n        [\n            'start_date' => '2025-10-31',\n            'start_time' => '11:30',\n            'pax' => 2,\n            'flight' => 'JHG0987',\n            'service_type_id' => '66c8d82098b4b246ec02a1c2',\n            'vehicle_type_id' => '66aa78be9613f729b9017de2',\n            'description' => 'Levar para o barra shopping',\n            'participants' => [\n                ['name' => 'Fulano', 'phone' => '(11) 99999-9999'],\n            ],\n            'route' => [\n                [\n                    'origin' => ['name' => 'Ed. Central', 'street' => 'Av. Rio Branco'],\n                    'destination' => ['name' => 'SDU', 'street' => 'Aeroporto Santos Dumont'],\n                    'time' => 30,\n                    'km' => 15.5,\n                ],\n            ],\n        ],\n    ],\n]);\n\n$data = json_decode($response->getBody(), true);\nprint_r($data);"
          }
        ]
      }
    },
    "/services/update/{id}": {
      "patch": {
        "operationId": "service.update",
        "description": "Atualiza o serviço especificado. O parâmetro ID corresponde ao atributo service_map_id. Apenas serviços com status 'Created' ou 'Changed' podem ser atualizados. Todos os campos são opcionais — envie apenas os que deseja alterar. O status será automaticamente alterado para 'Changed'. Também é possível enviar novas rotas (route) que substituirão as existentes.",
        "summary": "Update Service",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" },
          {
            "name": "id",
            "in": "path",
            "required": true,
            "description": "O service_map_id do serviço a ser atualizado",
            "schema": { "type": "integer" }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ServiceUpdateRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Serviço atualizado com sucesso",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ServiceShowResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ValidationException" },
          "401": { "$ref": "#/components/responses/AuthenticationException" },
          "403": {
            "description": "Serviço com status que não permite alteração",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": {
                  "status": 403,
                  "message": "Servico com status Finished nao pode ser alterado."
                }
              }
            }
          },
          "404": {
            "description": "Serviço não encontrado",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": { "status": 404, "message": "Servico nao encontrado." }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst serviceMapId = 123;\n\nconst response = await axios.patch(\n  `https://api-staging.zarpx.com/api/v1/services/update/${serviceMapId}`,\n  {\n    start_date: '2025-11-15',\n    start_time: '14:00',\n    description: 'Descrição atualizada'\n  },\n  {\n    headers: {\n      'Authorization': `Bearer ${accessToken}`,\n      'Content-Type': 'application/json',\n      'X-Access-Service': 'external'\n    }\n  }\n);\n\nconsole.log(response.data); // serviço atualizado"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n$serviceMapId = 123;\n\n$response = $client->patch(\"https://api-staging.zarpx.com/api/v1/services/update/{$serviceMapId}\", [\n    'headers' => [\n        'Authorization' => 'Bearer ' . $accessToken,\n        'Content-Type' => 'application/json',\n        'X-Access-Service' => 'external',\n    ],\n    'json' => [\n        'start_date' => '2025-11-15',\n        'start_time' => '14:00',\n        'description' => 'Descrição atualizada',\n    ],\n]);\n\n$data = json_decode($response->getBody(), true);\nprint_r($data); // serviço atualizado"
          }
        ]
      }
    },
    "/services/cancel/{id}": {
      "delete": {
        "operationId": "service.cancel",
        "description": "Cancela (soft delete) o serviço especificado. O parâmetro ID corresponde ao atributo service_map_id. Apenas serviços com status 'Created' ou 'Changed' podem ser cancelados. O status será alterado para 'Canceled'.",
        "summary": "Cancel Service",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" },
          {
            "name": "id",
            "in": "path",
            "description": "O service_map_id do serviço a ser cancelado",
            "required": true,
            "schema": { "type": "integer" }
          }
        ],
        "responses": {
          "204": { "description": "Nenhum corpo retornado na resposta" },
          "400": {
            "description": "ID inválido",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": { "status": 400, "message": "ID invalido." }
              }
            }
          },
          "401": { "$ref": "#/components/responses/AuthenticationException" },
          "403": {
            "description": "Serviço com status que não permite cancelamento",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": {
                  "status": 403,
                  "message": "Servico com status Finished nao pode ser cancelado."
                }
              }
            }
          },
          "404": {
            "description": "Serviço não encontrado",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": { "status": 404, "message": "Servico nao encontrado." }
              }
            }
          },
          "500": {
            "description": "Erro interno do servidor",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ErrorResponse" },
                "example": {
                  "status": 500,
                  "message": "Erro interno do servidor."
                }
              }
            }
          }
        },
        "x-codeSamples": [
          {
            "label": "JavaScript (Axios)",
            "lang": "javascript",
            "source": "const axios = require('axios');\n\nconst serviceMapId = 123;\n\nconst response = await axios.delete(\n  `https://api-staging.zarpx.com/api/v1/services/cancel/${serviceMapId}`,\n  {\n    headers: {\n      'Authorization': `Bearer ${accessToken}`,\n      'X-Access-Service': 'external'\n    }\n  }\n);\n\nconsole.log(response.status); // 204"
          },
          {
            "label": "PHP (Guzzle)",
            "lang": "php",
            "source": "<?php\nuse GuzzleHttp\\Client;\n\n$client = new Client();\n$serviceMapId = 123;\n\n$response = $client->delete(\"https://api-staging.zarpx.com/api/v1/services/cancel/{$serviceMapId}\", [\n    'headers' => [\n        'Authorization' => 'Bearer ' . $accessToken,\n        'X-Access-Service' => 'external',\n    ],\n]);\n\necho $response->getStatusCode(); // 204"
          }
        ]
      }
    },
    "/services/index": {
      "get": {
        "operationId": "service.index",
        "description": "Lista todos os serviços de uma data específica com paginação. Retorna os dados completos de cada serviço com seus relacionamentos carregados (service_type, vehicle_type, driver, vehicle e route_service).",
        "summary": "Index Services by Date",
        "tags": ["Service"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "$ref": "#/components/parameters/XAccessService" },
          {
            "name": "date",
            "in": "query",
            "required": true,
            "description": "Data exata para filtro no formato YYYY-MM-DD",
            "schema": { "type": "string", "format": "date", "pattern": "^\\d{4}-\\d{2}-\\d{2}$" },
            "example": "2026-04-23"
          },
          {
            "name": "page",
            "in": "query",
            "required": true,
